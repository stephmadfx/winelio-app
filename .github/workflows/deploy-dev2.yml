name: Deploy to dev2.winelio.app

on:
  push:
    branches:
      - dev2
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'next.config.*'
      - 'tailwind.config.*'
      - 'tsconfig.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          curl -X POST \
            --max-time 30 \
            --connect-timeout 10 \
            "http://31.97.152.195:8000/api/v1/deploy?uuid=eo5jc02jc760apovne577bln&force=true" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            || echo "::warning::Coolify trigger failed or timed out — deploy manually if needed"
