# Smoke Test - Recommandations (iOS Safari)
#
# Tests : chargement page, onglets Envoyées/Reçues, filtres statut, bouton nouvelle reco
# Prérequis :
# - Simulateur iOS démarré
# - App Next.js en cours (npm run dev) sur localhost:3000
# - Utilisateur connecté dans Safari (session Supabase active)

appId: com.apple.mobilesafari
env:
  APP_URL: http://localhost:3000
tags:
  - smoke
  - ios
  - reco
---

# ==========================================
# STEP 1 : LANCEMENT + NAVIGATION
# ==========================================

- launchApp

# Prévention crash XCTest sur cold boot iOS
- swipe:
    direction: DOWN
    duration: 100

- openLink: "${APP_URL}/recommendations"

- extendedWaitUntil:
    visible: "Recommandations"
    timeout: 15000

- takeScreenshot: 01-reco-page-loaded

# ==========================================
# STEP 2 : VÉRIFICATION DU HEADER
# ==========================================

- assertVisible: "Mise en relation"
- assertVisible: "Nouvelle recommandation"

# ==========================================
# STEP 3 : ONGLETS ENVOYÉES / REÇUES
# ==========================================

- assertVisible: "Envoyées"
- assertVisible: "Reçues"

- tapOn: "Envoyées"
- takeScreenshot: 02-tab-envoyees

- tapOn: "Reçues"
- extendedWaitUntil:
    visible: "Reçues"
    timeout: 5000
- takeScreenshot: 03-tab-recues

- tapOn: "Envoyées"

# ==========================================
# STEP 4 : FILTRES STATUT
# ==========================================

- assertVisible: "Toutes"
- assertVisible: "En attente"
- assertVisible: "Validées"
- assertVisible: "Terminées"
- assertVisible: "Annulées"

- tapOn: "En attente"
- takeScreenshot: 04-filter-en-attente

- tapOn: "Validées"
- takeScreenshot: 05-filter-validees

- tapOn: "Toutes"
- takeScreenshot: 06-filter-toutes

# ==========================================
# STEP 5 : BOUTON NOUVELLE RECOMMANDATION
# ==========================================

- tapOn: "Nouvelle recommandation"

- extendedWaitUntil:
    visible: "Contact"
    timeout: 8000

- takeScreenshot: 07-new-reco-page
